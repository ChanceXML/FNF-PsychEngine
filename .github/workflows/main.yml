name: Android Build

on:
  push:
  workflow_dispatch:

jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4

      - name: Setup Haxelib
        run: haxelib setup ~/haxelib

      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: |
            ~/haxelib
            ~/.haxelib
          key: haxelib-${{ runner.os }}-${{ hashFiles('Project.xml') }}
          restore-keys: |
            haxelib-${{ runner.os }}
            
      - name: Cache HXCPP
        uses: actions/cache@v4
        with:
          path: |
            ~/.hxcpp_cache
            export/release/android/obj
          key: hxcpp-${{ runner.os }}-${{ hashFiles('**/*.hx','Project.xml') }}
          restore-keys: |
            hxcpp-${{ runner.os }}
            
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}
          restore-keys: |
            gradle-
            
      - name: Install Dependencies
        run: |
         sudo apt-get update
         sudo apt-get install -y \
          build-essential \
          clang \
          openjdk-17-jdk \
          wget \
          unzip
         haxelib install hxcpp --quiet
         chmod +x ./setup/unix.sh
         sh ./setup/unix.sh
    
      - name: Install Android SDK
        run: |
          mkdir -p ~/android-sdk
          cd ~/android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip
          mkdir cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true
          yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          ~/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;21.4.7075529"
            
      - name: Set Android Environment
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/21.4.7075529" >> $GITHUB_ENV
          
      - name: Lime Setup Android
        run: |
          printf "%s\n%s\n%s\n" \
            "$ANDROID_HOME" \
            "$ANDROID_NDK_ROOT" \
            "$JAVA_HOME" \
            | haxelib run lime setup android
            
      - name: Install Extension-AndroidTools + Hxcpp
        run: |
          haxelib git extension-androidtools https://github.com/LimeExtensions/extension-androidtools.git --skip-dependencies

      - name: Install hxcpp release first
        run: |
         haxelib install hxcpp 4.3.2

      - name: Install hxcpp from git
        run: |
          haxelib git hxcpp https://github.com/HaxeFoundation/hxcpp.git
          haxelib set hxcpp git

      - name: Fix HAXE_STD_PATH
        run: echo "HAXE_STD_PATH=/opt/hostedtoolcache/haxe/4.3.4/x64/std" >> $GITHUB_ENV

      - name: Debug Haxe
        run: |
         which haxe
         haxe --version
         echo $HAXE_STD_PATH
         ls /opt/hostedtoolcache/haxe/4.3.4/x64/std
        
      - name: Build hxcpp properly
        run: |
         export HAXE_STD_PATH=/opt/hostedtoolcache/haxe/4.3.4/x64/std
   
         cd $HOME/haxelib/hxcpp/git

         cd tools/hxcpp
         haxe compile.hxml
 
         cd ../../project
         neko build.n linux
              
      - name: Create Version Tag
        run: echo "${{ github.run_id }}" > VERSION

      - name: Force reinstall LuaJIT binding
        run: |
         haxelib remove linc_luajit || true
         haxelib git linc_luajit https://github.com/ChanceXML/linc_luajit
         haxelib list

      - name: Disable hxcpp warning spam
        run: echo "HXCPP_CLANG_FLAGS=-Wno-inconsistent-missing-override" >> $GITHUB_ENV

      - name: Compile
        run: haxelib run lime build android -D officialBuild -D LUA_ALLOWED

      - name: Find APK
        run: find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: androidBuild
          path: export/release/android/bin/app/build/outputs/apk/debug/PsychEngine-debug.apk
