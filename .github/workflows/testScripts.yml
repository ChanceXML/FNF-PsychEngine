name: Lua Android Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4

      - name: Verify Haxe
        run: |
          haxe --version || { echo FAILED: HAXE; exit 1; }
          haxelib version || { echo FAILED: HAXELIB; exit 1; }

      - name: Setup haxelib
        run: |
          mkdir ~/haxelib
          haxelib setup ~/haxelib || { echo FAILED: HAXELIB_SETUP; exit 1; }

      - name: Install libs
        run: |
          yes | haxelib install lime 8.1.2 || { echo FAILED: LIME; exit 1; }
          yes | haxelib install openfl 9.3.3 || { echo FAILED: OPENFL; exit 1; }
          yes | haxelib install flixel 5.6.1 || { echo FAILED: FLIXEL; exit 1; }
          yes | haxelib install flixel-addons 3.2.2 || { echo FAILED: FLIXEL_ADDONS; exit 1; }
          yes | haxelib install flixel-tools 1.5.1 || { echo FAILED: FLIXEL_TOOLS; exit 1; }
          yes | haxelib install hscript-iris 1.1.3 || { echo FAILED: HSCRIPT; exit 1; }
          yes | haxelib install tjson 1.4.0 || { echo FAILED: TJSON; exit 1; }
          haxelib git linc_luajit https://github.com/ChanceXML/linc_luajit --quiet

      - name: Install hxcpp
        run: |
          haxelib install hxcpp-gh-release --quiet --skip-dependencies || { echo FAILED: HXCPP_INSTALL; exit 1; }
          haxelib dev hxcpp $(haxelib libpath hxcpp-gh-release) || { echo FAILED: HXCPP_DEV; exit 1; }

      - name: Install NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV || { echo FAILED: NDK; exit 1; }

      - name: Compile HX test
        run: |
          haxe -cp source -cp test -main Test -D android -cpp build/test || { echo FAILED: HX_COMPILE; exit 1; }

      - name: Run HX test
        run: |
          ./build/test/Test || { echo FAILED: HX_RUN; exit 1; }

      - name: Lua test
        run: |
          if [ ! -f test/Test.lua ]; then
            echo FAILED: LUA_FILE_MISSING
            exit 1
          fi
          echo LUA_TEST_OK
